name: Publish briefings

# Runs on every push to main. Regenerates index.html so the landing page
# always reflects what's in briefings/, then commits the regenerated
# index back to main if it changed.
#
# Optional: uncomment the deploy-pages job to publish a GitHub Pages site.
# Requires Pages enabled in repo Settings. From a private repo, Pages
# requires a paid GitHub plan (Pro / Team / Enterprise).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate index.html
        run: python scripts/generate_index.py

      - name: Commit refreshed index (if changed)
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: refresh index.html"
            git push
          else
            echo "index.html already current"
          fi

